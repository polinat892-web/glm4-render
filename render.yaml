services:
  - type: web
    name: glm4-final
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10001
      - key: ANONYMOUS_MODE
        value: true
      - key: UPSTREAM_URL
        value: https://chat.z.ai/api/chat/completions
      - key: MODEL
        value: GLM-4.7
